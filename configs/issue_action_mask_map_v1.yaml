schema_version: issue-action-mask-map-v1
defaults:
  mask_value: 255
  preserve_value: 0
issue_map:
  entity_missing:
    action_type: INSERT
    preferred_mask_types: [bbox, polygon]
  entity_extra:
    action_type: DELETE
    preferred_mask_types: [instance_ref, bbox]
  category_mismatch:
    action_type: REPLACE
    preferred_mask_types: [instance_ref, bbox]
  relation_violation:
    action_type: MOVE
    preferred_mask_types: [bbox, polygon]
  orientation_violation:
    action_type: ADJUST_ORIENTATION
    preferred_mask_types: [instance_ref, bbox]

